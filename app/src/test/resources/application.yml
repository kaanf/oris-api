spring:
  datasource:
    url: jdbc:h2:mem:oris_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
    hikari:
      maximum-pool-size: 2
      minimum-idle: 0

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        show_sql: false
        format_sql: false

  rabbitmq:
    listener:
      simple:
        auto-startup: false
      direct:
        auto-startup: false

oris:
  rate-limit:
    ip:
      apply-limit: false
