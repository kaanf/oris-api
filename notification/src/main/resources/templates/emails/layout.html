<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title th:text="${title}">Email</title>
</head>

<body style="margin:0; padding:0; background:#f6f7f9;">

<div style="display:none; max-height:0; overflow:hidden; opacity:0; color:transparent;"
     th:text="${preheader}">
    Preview text
</div>

<table th:fragment="layout(content)"
       role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
       style="background:#f6f7f9; padding:24px 12px;">
    <tr>
        <td align="center">
            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600"
                   style="width:600px; max-width:600px; background:#ffffff; border:1px solid #e6e8ee; border-radius:14px; overflow:hidden;">

                <tr th:replace="emails/fragment/header :: header(appName=${appName})"></tr>

                <tr th:replace="${content}"></tr>

                <tr th:replace="emails/fragment/footer :: footer(appName=${appName},
                                                           companyName=${companyName},
                                                           companyAddressLine1=${companyAddressLine1},
                                                           companyAddressLine2=${companyAddressLine2},
                                                           supportEmail=${supportEmail},
                                                           privacyUrl=${privacyUrl},
                                                           termsUrl=${termsUrl},
                                                           messageId=${messageId},
                                                           sentAt=${sentAt})"></tr>

            </table>

            <div style="height:16px;"></div>

            <div style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
                      font-size:11px; color:#94a3b8;"
                 th:text="'You’re receiving this because you attempted to use ' + ${appName} + '.'">
                You’re receiving this because…
            </div>
        </td>
    </tr>
</table>
</body>
</html>
