<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="emails/layout :: layout(~{::bodyRow})">
<body>

<tr th:fragment="bodyRow">
    <td style="padding:22px;">
        <div style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
                    color:#0f172a; font-size:16px; line-height:1.6;">

            <div style="font-size:18px; font-weight:700; margin-bottom:10px;">
                Verify your email
            </div>

            <div style="margin-bottom:14px; color:#334155;">
                Hi <span th:text="${username}">user</span>,<br/>
                Please confirm that <span style="font-weight:700;" th:text="${email}">mail</span> belongs to you.
            </div>

            <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin:18px 0 10px;">
                <tr>
                    <td bgcolor="#111827" style="border-radius:12px;">
                        <a th:href="${verificationUrl}"
                           style="display:inline-block; padding:12px 16px; text-decoration:none;
                          font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
                          font-size:14px; color:#ffffff; border-radius:12px;">
                            Verify email →
                        </a>
                    </td>
                </tr>
            </table>

            <div style="font-size:13px; color:#475569; margin-top:12px;">
                This link expires in <span style="font-weight:700;" th:text="${expiresIn}">15 minutes</span>.
            </div>

            <div style="margin-top:16px; padding:12px; border:1px solid #e2e8f0; border-radius:12px; background:#f8fafc;">
                <div style="font-size:12px; color:#64748b; margin-bottom:6px;">
                    If the button doesn’t work, copy & paste:
                </div>
                <div style="font-size:12px; word-break:break-all; color:#0f172a;"
                     th:text="${verificationUrl}">
                    url
                </div>
            </div>

            <div style="margin-top:16px; font-size:12px; color:#64748b;">
                If you didn’t create an account, you can safely ignore this email.
            </div>
        </div>
    </td>
</tr>
</body>
</html>
