<html xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="footer(appName, companyName, companyAddressLine1, companyAddressLine2, supportEmail, privacyUrl, termsUrl, messageId, sentAt)">
    <td style="padding:16px 22px; border-top:1px solid #e6e8ee; background:#fbfcfe;">
        <div style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
                    font-size:12px; line-height:1.6; color:#64748b;">
            <div style="opacity:0.9;">
                Support:
                <a th:href="'mailto:' + ${supportEmail}" style="color:#0f172a; text-decoration:underline;"
                   th:text="${supportEmail}">
                    support@example.com
                </a>
                ·
                <a th:href="${privacyUrl}" style="color:#0f172a; text-decoration:underline;">Privacy</a>
                ·
                <a th:href="${termsUrl}" style="color:#0f172a; text-decoration:underline;">Terms</a>
            </div>

            <div style="margin-top:10px; font-size:11px; opacity:0.8;">
                <span th:text="'Email ID: ' + ${messageId}">Email ID: ...</span>
                <span th:if="${sentAt != null}" th:text="' · Sent: ' + ${sentAt}"> · Sent: ...</span>
            </div>
        </div>
    </td>
</tr>
</body>
</html>
