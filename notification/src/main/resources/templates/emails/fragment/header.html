<html xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="header(appName)">
    <td style="padding:18px 22px; background:#0b0f19;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
            <tr>
                <td style="font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
                       font-size:14px; letter-spacing:0.5px; color:#c7d2fe;">
                    <span style="color:#ffffff; font-weight:700;" th:text="${appName}">App</span>
                    <span style="opacity:0.65;">/ auth</span>
                </td>
            </tr>
        </table>
    </td>
</tr>
</body>
</html>
